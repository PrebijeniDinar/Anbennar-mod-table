<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anbennar Sub-Mods</title>
  <!-- Tabulator CSS -->
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <style>
    /* -------- CUSTOM STYLES -------- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 10px;
      background: #f4f4f4;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    /* Category dropdown */
    #categorySelect {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    /* Tag selection area */
    #tagArea {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tag-chip {
      background: #e0e0e0;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 0.85em;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: default;
    }
    .tag-chip .remove-tag {
      cursor: pointer;
      font-weight: bold;
      margin-left: 2px;
    }
    #addTagBtn {
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tagDropdown {
      display: none;
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .tag-option {
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tag-option:hover {
      background: #f0f0f0;
    }
    /* Search box */
    #searchInput {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 200px;
    }
    /* Page size */
    #pageSizeSelect {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    /* Mod counter */
    #modCounter {
      font-weight: bold;
      margin-left: auto;
    }
    /* Modal for dependency details */
    #depModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #depModal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      width: 90%;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 10px; right: 10px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }
    /* Links styling */
    .link-btn {
      display: inline-block;
      margin: 2px;
      padding: 2px 8px;
      background: #eee;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      font-size: 0.9em;
    }
    .link-btn:hover { background: #ddd; }
    /* Dependency link inside cell */
    .dep-link {
      color: #0066cc;
      cursor: pointer;
      text-decoration: underline;
      margin-right: 4px;
    }
    .dep-link:hover { color: #004499; }
  </style>
</head>
<body>

  <!-- ========= CONTROLS ========= -->
  <div id="controls">
    <!-- Category dropdown -->
    <select id="categorySelect">
      <option value="All">All</option>
      <option value="Gameplay">Gameplay</option>
      <option value="Compatch">Compatch</option>
      <option value="Graphical">Graphical</option>
      <option value="Flavour">Flavour</option>
      <option value="Miscellaneous">Miscellaneous</option>
    </select>

    <!-- Tags area -->
    <div id="tagArea">
      <button id="addTagBtn" title="Add tag filter">+</button>
      <div id="tagDropdown"></div>
      <!-- Chips appear here dynamically -->
    </div>

    <!-- Search -->
    <input type="text" id="searchInput" placeholder="Search...">

    <!-- Page size selector -->
    <select id="pageSizeSelect">
      <option value="10">10</option>
      <option value="20" selected>20</option>
      <option value="50">50</option>
      <option value="All">All</option>
    </select>

    <!-- Mod counter -->
    <span id="modCounter">0 / 0</span>
  </div>

  <!-- ========= TABLE CONTAINER ========= -->
  <div id="modTable"></div>

  <!-- ========= DEPENDENCY MODAL ========= -->
  <div id="depModal">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h3 id="modalModName"></h3>
      <p><strong>Category:</strong> <span id="modalCategory"></span></p>
      <p><strong>Tags:</strong> <span id="modalTags"></span></p>
      <p><strong>Description:</strong> <span id="modalDescription"></span></p>
      <p>
        <strong>Links:</strong>
        <span id="modalLinks"></span>
      </p>
    </div>
  </div>

  <!-- ========= SCRIPTS ========= -->
  <!-- Tabulator JS -->
  <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
  <script>
    // ----------------------------------------------------------------------
    // 1. YOUR MOD DATA – EDIT HERE TO ADD/REMOVE SUB-MODS
    // ----------------------------------------------------------------------
    const modData = [
      {
        name: "Example Mod 1",
        category: "Gameplay",
        tags: ["Missions", "Nations", "Religion"],
        description: "Adds Jaddari missions, new tags and a custom religion.",
        dependencies: ["Base Mod B", "Another Mod"],
        links: {
          browser: "https://steamcommunity.com/sharedfiles/filedetails/?id=111111",
          steam: "steam://openurl/https://steamcommunity.com/sharedfiles/filedetails/?id=111111"
        }
      },
      {
        name: "Base Mod B",
        category: "Miscellaneous",
        tags: ["Standalone", "Tweak"],
        description: "Standalone tweaks for vanilla EU4, no Anbennar needed.",
        dependencies: [],
        links: {
          browser: "https://steamcommunity.com/sharedfiles/filedetails/?id=222222",
          steam: "steam://openurl/https://steamcommunity.com/sharedfiles/filedetails/?id=222222"
        }
      },
      {
        name: "Another Mod",
        category: "Compatch",
        tags: ["Multiplayer", "Compilation"],
        description: "Compilation of various multiplayer patches.",
        dependencies: ["Example Mod 1"],
        links: {
          browser: "https://steamcommunity.com/sharedfiles/filedetails/?id=333333",
          steam: "steam://openurl/https://steamcommunity.com/sharedfiles/filedetails/?id=333333"
        }
      },
      // Add more mods here...
    ];

    // ----------------------------------------------------------------------
    // 2. GLOBAL STATE
    // ----------------------------------------------------------------------
    let table;
    let selectedTags = [];            // array of tag strings currently filtering
    let currentCategory = "All";
    let currentSearch = "";

    // ----------------------------------------------------------------------
    // 3. INITIALIZE TABLE
    // ----------------------------------------------------------------------
    document.addEventListener("DOMContentLoaded", function() {
      table = new Tabulator("#modTable", {
        data: modData,
        layout: "fitColumns",       // stretch columns to fill width
        responsiveLayout: "collapse", // hide columns on small screens, show expand arrow
        pagination: true,
        paginationSize: 20,
        paginationSizeSelector: false, // we use our custom selector
        columns: [
          { 
            title: "Name", 
            field: "name", 
            headerFilter: false,
            responsive: 0,          // always visible
            sorter: "string",
            width: 200
          },
          { 
            title: "Category", 
            field: "category", 
            responsive: 1,
            sorter: "string",
            width: 120
          },
          { 
            title: "Tags", 
            field: "tags", 
            responsive: 2,
            sorter: "string",
            formatter: function(cell, formatterParams, onRendered) {
              // Display tags as small colored badges
              const tags = cell.getValue() || [];
              return tags.map(tag => `<span class="tag-chip" style="font-size:0.75em; margin:1px;">${tag}</span>`).join('');
            },
            width: 250
          },
          { 
            title: "Description", 
            field: "description", 
            responsive: 3,
            sorter: "string",
            formatter: "textarea",
            width: 300
          },
          { 
            title: "Dependencies", 
            field: "dependencies", 
            responsive: 4,
            sorter: "string",
            formatter: function(cell) {
              const deps = cell.getValue() || [];
              if (deps.length === 0) return "—";
              return deps.map(dep => 
                `<span class="dep-link" data-dep="${dep}">${dep}</span>`
              ).join(', ');
            },
            width: 200,
            cellClick: function(e, cell) {
              // If a dependency link was clicked, open its modal
              if (e.target.classList.contains('dep-link')) {
                const depName = e.target.getAttribute('data-dep');
                showDependencyModal(depName);
              }
            }
          },
          { 
            title: "Links", 
            field: "links", 
            responsive: 5,
            sorter: "string",
            formatter: function(cell) {
              const links = cell.getValue();
              if (!links) return "—";
              return `
                <a href="${links.browser}" target="_blank" class="link-btn" title="Open in browser">🌐</a>
                <a href="${links.steam}" class="link-btn" title="Open in Steam">Steam</a>
              `;
            },
            width: 100,
            headerSort: false
          }
        ],
        // Update mod counter after data is filtered
        dataFiltered: function(filters, rows) {
          updateModCounter();
        },
        // Reapply custom filters when data changes (for search/tags/category)
        dataLoaded: function(data) {
          applyFilters();
        }
      });

      // Setup UI controls
      setupControls();
      // Initial application of filters (category is "All", no tags yet)
      applyFilters();
    });

    // ----------------------------------------------------------------------
    // 4. UI CONTROLS & EVENT HANDLERS
    // ----------------------------------------------------------------------
    function setupControls() {
      // Category dropdown
      document.getElementById('categorySelect').addEventListener('change', function(e) {
        currentCategory = e.target.value;
        updateAvailableTags();   // tags shown in dropdown depend on category
        applyFilters();
      });

      // Tag addition button
      document.getElementById('addTagBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('tagDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        updateAvailableTags();  // refresh list
      });

      // Close tag dropdown when clicking outside
      document.addEventListener('click', function() {
        document.getElementById('tagDropdown').style.display = 'none';
      });

      // Search input
      document.getElementById('searchInput').addEventListener('input', function(e) {
        currentSearch = e.target.value.toLowerCase();
        applyFilters();
      });

      // Page size selector
      document.getElementById('pageSizeSelect').addEventListener('change', function(e) {
        const val = e.target.value;
        if (val === "All") {
          // When "All" selected, set page size to total filtered rows
          const filteredCount = table.getRows().length;
          table.setPageSize(filteredCount || 1);
          // Hide pagination controls (optional)
          document.querySelector('.tabulator-paginator').style.display = 'none';
        } else {
          document.querySelector('.tabulator-paginator').style.display = '';
          table.setPageSize(parseInt(val));
        }
      });

      // Modal close button
      document.querySelector('#depModal .modal-close').addEventListener('click', closeModal);
      document.getElementById('depModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
    }

    // ----------------------------------------------------------------------
    // 5. FILTERING LOGIC
    // ----------------------------------------------------------------------
    function applyFilters() {
      table.setFilter(customFilter);
      // Ensure "All" page size still works after filtering
      const pageSizeEl = document.getElementById('pageSizeSelect');
      if (pageSizeEl.value === "All") {
        const filteredCount = table.getRows().length;
        table.setPageSize(filteredCount || 1);
      }
      updateModCounter();
    }

    function customFilter(data) {
      // Category filter
      if (currentCategory !== "All" && data.category !== currentCategory) {
        return false;
      }
      // Tag filter (AND logic: mod must contain ALL selected tags)
      if (selectedTags.length > 0) {
        if (!data.tags || !selectedTags.every(tag => data.tags.includes(tag))) {
          return false;
        }
      }
      // Search filter (case-insensitive across name, description, tags)
      if (currentSearch) {
        const searchTarget = [
          data.name,
          data.description,
          (data.tags || []).join(' ')
        ].join(' ').toLowerCase();
        if (!searchTarget.includes(currentSearch)) {
          return false;
        }
      }
      return true;
    }

    // ----------------------------------------------------------------------
    // 6. TAG SELECTION DYNAMICS
    // ----------------------------------------------------------------------
    function updateAvailableTags() {
      const dropdown = document.getElementById('tagDropdown');
      // Determine which mods are relevant based on current category
      const relevantMods = currentCategory === "All" 
        ? modData 
        : modData.filter(m => m.category === currentCategory);
      
      // Get all unique tags from those mods, excluding already selected ones
      const allTags = new Set();
      relevantMods.forEach(mod => {
        (mod.tags || []).forEach(tag => allTags.add(tag));
      });
      const available = [...allTags].filter(tag => !selectedTags.includes(tag)).sort();
      
      // Build dropdown options
      dropdown.innerHTML = available.map(tag => 
        `<div class="tag-option" data-tag="${tag}">${tag}</div>`
      ).join('');
      
      // Add click listeners to options
      dropdown.querySelectorAll('.tag-option').forEach(opt => {
        opt.addEventListener('click', function(e) {
          e.stopPropagation();
          const tag = this.getAttribute('data-tag');
          addTag(tag);
          dropdown.style.display = 'none';
        });
      });
    }

    function addTag(tag) {
      if (!selectedTags.includes(tag)) {
        selectedTags.push(tag);
        renderTagChips();
        updateAvailableTags();
        applyFilters();
      }
    }

    function removeTag(tag) {
      selectedTags = selectedTags.filter(t => t !== tag);
      renderTagChips();
      updateAvailableTags();
      applyFilters();
    }

    function renderTagChips() {
      const tagArea = document.getElementById('tagArea');
      // Remove all existing chips (but keep the + button and dropdown)
      const existingChips = tagArea.querySelectorAll('.tag-chip');
      existingChips.forEach(chip => chip.remove());
      
      // Insert chips before the dropdown div
      const addBtn = document.getElementById('addTagBtn');
      selectedTags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.innerHTML = `${tag} <span class="remove-tag" data-tag="${tag}">&times;</span>`;
        tagArea.insertBefore(chip, addBtn);
      });
      
      // Attach remove events
      document.querySelectorAll('.remove-tag').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const tag = this.getAttribute('data-tag');
          removeTag(tag);
        });
      });
    }

    // ----------------------------------------------------------------------
    // 7. DEPENDENCY MODAL
    // ----------------------------------------------------------------------
    function showDependencyModal(modName) {
      const mod = modData.find(m => m.name === modName);
      if (!mod) {
        alert(`Mod "${modName}" not found in database.`);
        return;
      }
      document.getElementById('modalModName').textContent = mod.name;
      document.getElementById('modalCategory').textContent = mod.category;
      document.getElementById('modalTags').textContent = (mod.tags || []).join(', ') || '—';
      document.getElementById('modalDescription').textContent = mod.description || '—';
      
      const linksSpan = document.getElementById('modalLinks');
      linksSpan.innerHTML = '';
      if (mod.links) {
        linksSpan.innerHTML = `
          <a href="${mod.links.browser}" target="_blank" class="link-btn">🌐 Browser</a>
          <a href="${mod.links.steam}" class="link-btn">Steam</a>
        `;
      } else {
        linksSpan.textContent = 'No links';
      }
      
      document.getElementById('depModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('depModal').classList.remove('active');
    }

    // ----------------------------------------------------------------------
    // 8. MOD COUNTER
    // ----------------------------------------------------------------------
    function updateModCounter() {
      const filtered = table.getRows().length;
      const total = modData.length;
      document.getElementById('modCounter').textContent = `${filtered} / ${total}`;
    }

    // Initial render of tag chips (empty)
    renderTagChips();
  </script>
</body>
</html>
