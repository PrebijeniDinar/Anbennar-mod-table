<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anbennar Sub-Mods</title>
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 10px;
      background: #f4f4f4;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    #categorySelect {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    #tagArea {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tag-chip {
      background: #e0e0e0;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 0.85em;
      display: inline-block;
      align-items: center;
      gap: 5px;
      cursor: default;
      white-space: nowrap;
    }
    .tag-chip .remove-tag {
      cursor: pointer;
      font-weight: bold;
      margin-left: 2px;
    }
    #addTagBtn {
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tagDropdown {
      display: none;
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .tag-option {
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tag-option:hover { background: #f0f0f0; }
    #searchInput {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 200px;
    }
    #pageSizeSelect {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    #modCounter {
      font-weight: bold;
      margin-left: auto;
    }
    #depModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #depModal.active { display: flex; }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      width: 90%;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 10px; right: 10px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }
    .link-btn {
      display: inline-block;
      margin: 2px;
      padding: 2px 8px;
      background: #eee;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      font-size: 0.9em;
    }
    .link-btn:hover { background: #ddd; }
    .dep-link {
      color: #0066cc;
      cursor: pointer;
      text-decoration: underline;
      margin-right: 4px;
    }
    .dep-link:hover { color: #004499; }
    #modTable {
      width: 100% !important;
      max-width: 100%;
      overflow-x: auto;   /* keep horizontal scroll only if really needed */
    }
    .tabulator {
      background-color: white;
      width: 100% !important;
    }
    .tabulator .tabulator-cell.tags-cell {
      white-space: normal;      /* allow text to wrap */
      word-break: keep-all;     /* keep tags together, break only between them */
      line-height: 1.6;         /* a bit more vertical breathing room */
    }

    
  </style>
</head>
<body>

  <div id="controls">
    <select id="categorySelect">
      <option value="All">All</option>
      <option value="Gameplay">Gameplay</option>
      <option value="Compatch">Compatch</option>
      <option value="Graphical">Graphical</option>
      <option value="Flavour">Flavour</option>
      <option value="Miscellaneous">Miscellaneous</option>
    </select>

    <div id="tagArea">
      <button id="addTagBtn" title="Add tag filter">+</button>
      <div id="tagDropdown"></div>
    </div>

    <input type="text" id="searchInput" placeholder="Search...">

    <select id="pageSizeSelect">
      <option value="10">10</option>
      <option value="20" selected>20</option>
      <option value="50">50</option>
      <option value="All">All</option>
    </select>

    <span id="modCounter">0 / 0</span>
  </div>

  <div id="modTable"></div>

  <div id="depModal">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h3 id="modalModName"></h3>
      <p><strong>Category:</strong> <span id="modalCategory"></span></p>
      <p><strong>Tags:</strong> <span id="modalTags"></span></p>
      <p><strong>Description:</strong> <span id="modalDescription"></span></p>
      <p>
        <strong>Links:</strong>
        <span id="modalLinks"></span>
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
  <script>
    //////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    // Just put the fucking link here
    //////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    //////////////////////////////////////////////////////////////////////////////////////////////////////////////////
   const CSV_URL = 'https://corsproxy.io/?' + encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vQtgc37M1MD3aBODr1Gz2zU92rj5dVausKxbFk2cr5nIzFEpFNge2T_t6Qm9X9x4y-GH46PCwOyP1nw/pub?output=csv');

    let table;
    let selectedTags = [];
    let currentCategory = "All";
    let currentSearch = "";
    let modData = [];

    async function loadData() {
  try {
    // YOUR ORIGINAL PUBLISHED CSV URL (without proxy, direct from Google Sheets)
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtgc37M1MD3aBODr1Gz2zU92rj5dVausKxbFk2cr5nIzFEpFNge2T_t6Qm9X9x4y-GH46PCwOyP1nw/pub?output=csv';
    
    // Add a cache-busting timestamp
    const separator = sheetUrl.includes('?') ? '&' : '?';
    const bustedUrl = sheetUrl + separator + 'cache=' + Date.now();
    
    // Wrap in CORS proxy
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(bustedUrl);
    
    const response = await fetch(proxyUrl);
    const csvText = await response.text();
    modData = parseCSV(csvText);
    buildTable();
    setupControls();
  } catch (error) {
    console.error('Failed to load data:', error);
    document.getElementById('modTable').innerText = 'Error loading data. Check console.';
  }
}

    function parseCSV(text) {
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // remove BOM
      const lines = text.split('\n').filter(line => line.trim() !== '');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        const values = [];
        let current = '';
        let inQuotes = false;
        for (let char of lines[i]) {
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(current.trim().replace(/^"|"$/g, ''));
            current = '';
          } else {
            current += char;
          }
        }
        values.push(current.trim().replace(/^"|"$/g, ''));
        while (values.length < headers.length) values.push('');
        const row = {};
        headers.forEach((header, idx) => {
          row[header] = values[idx] || '';
        });
        data.push(row);
      }
      return data;
    }

    function generateLinks(workshopId) {
      if (!workshopId || workshopId.trim() === '') return null;
      const browserUrl = `https://steamcommunity.com/sharedfiles/filedetails/?id=${workshopId}`;
      const steamUrl = `steam://openurl/${browserUrl}`;
      return { browser: browserUrl, steam: steamUrl };
    }

    function transformRow(row) {
      return {
        name: row['Name'] || '',
        category: row['Category'] || 'Miscellaneous',
        tags: row['Tags'] ? row['Tags'].split(',').map(t => t.trim()).filter(t => t) : [],
        description: row['Description'] || '',
        dependencies: row['Dependency/Compatch'] ? row['Dependency/Compatch'].split(',').map(d => d.trim()).filter(d => d) : [],
        links: generateLinks(row['Workshop ID'] || '')
      };
    }

    function buildTable() {
      const tableData = modData.map(transformRow);

      table = new Tabulator("#modTable", {
        data: tableData,
        layout: "fitColumns",
        responsiveLayout: "collapse",
        pagination: true,
        paginationSize: 20,
        paginationSizeSelector: false,
        columns: [
          { title: "Name", field: "name", responsive: 0, sorter: "string" },
          { title: "Category", field: "category", responsive: 1, sorter: "string", width: 100, widthShrink: 0, widthGrow: 0 },
          { title: "Tags", field: "tags", responsive: 2, cssClass: "tags-cell", formatter: function(cell) {
              const tags = cell.getValue() || [];
              return `<div style="max-width: 340px;">` + tags.map(tag => `<span class="tag-chip" style="font-size:0.75em; margin:1px;">${tag}</span>`).join('');
            }, },
          { title: "Description", field: "description", responsive: 3, formatter: "textarea" },
          { title: "Dependencies", field: "dependencies", responsive: 4,
            formatter: function(cell) {
              const deps = cell.getValue() || [];
              if (deps.length === 0) return "—";
              return deps.map(dep => `<span class="dep-link" data-dep="${dep}">${dep}</span>`).join(', ');
            },
            cellClick: function(e, cell) {
              if (e.target.classList.contains('dep-link')) {
                const depName = e.target.getAttribute('data-dep');
                showDependencyModal(depName);
              }
            } },
          { title: "Links", field: "links", responsive: 5,
            formatter: function(cell) {
              const links = cell.getValue();
              if (!links) return "—";
              return `<a href="${links.browser}" target="_blank" class="link-btn">🌐</a>
                      <a href="${links.steam}" class="link-btn">Steam</a>`;
            }, width: 130, widthShrink: 0, widthGrow: 0, headerSort: false }
        ],
        // Wait for the table to be fully built before applying filters
        tableBuilt: function() {
          applyFilters();
          updateModCounter();
        },
        dataFiltered: function() {
          updateModCounter();
        }
      });
    }

    function setupControls() {
      document.getElementById('categorySelect').addEventListener('change', function(e) {
        currentCategory = e.target.value;
        updateAvailableTags();
        applyFilters();
      });

      document.getElementById('addTagBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('tagDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        updateAvailableTags();
      });

      document.addEventListener('click', function() {
        document.getElementById('tagDropdown').style.display = 'none';
      });

      document.getElementById('searchInput').addEventListener('input', function(e) {
        currentSearch = e.target.value.toLowerCase();
        applyFilters();
      });

      document.getElementById('pageSizeSelect').addEventListener('change', function(e) {
        const val = e.target.value;
        if (val === "All") {
          const filteredCount = table.getRows().length;
          table.setPageSize(filteredCount || 1);
          document.querySelector('.tabulator-paginator').style.display = 'none';
        } else {
          document.querySelector('.tabulator-paginator').style.display = '';
          table.setPageSize(parseInt(val));
        }
      });

      document.querySelector('#depModal .modal-close').addEventListener('click', closeModal);
      document.getElementById('depModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
    }

    function applyFilters() {
      if (!table) return;
      table.setFilter(customFilter);
      const pageSizeEl = document.getElementById('pageSizeSelect');
      if (pageSizeEl.value === "All") {
        const filteredCount = table.getRows().length;
        table.setPageSize(filteredCount || 1);
      }
      updateModCounter();
    }

    function customFilter(data) {
      if (currentCategory !== "All" && data.category !== currentCategory) return false;
      if (selectedTags.length > 0) {
        if (!data.tags || !selectedTags.every(tag => data.tags.includes(tag))) return false;
      }
      if (currentSearch) {
        const searchTarget = [data.name, data.description, (data.tags || []).join(' ')].join(' ').toLowerCase();
        if (!searchTarget.includes(currentSearch)) return false;
      }
      return true;
    }

    function updateAvailableTags() {
      const dropdown = document.getElementById('tagDropdown');
      const relevantMods = currentCategory === "All" 
        ? modData 
        : modData.filter(row => transformRow(row).category === currentCategory);
      const allTags = new Set();
      relevantMods.forEach(row => {
        const tags = transformRow(row).tags;
        tags.forEach(tag => allTags.add(tag));
      });
      const available = [...allTags].filter(tag => !selectedTags.includes(tag)).sort();
      dropdown.innerHTML = available.map(tag => `<div class="tag-option" data-tag="${tag}">${tag}</div>`).join('');
      dropdown.querySelectorAll('.tag-option').forEach(opt => {
        opt.addEventListener('click', function(e) {
          e.stopPropagation();
          const tag = this.getAttribute('data-tag');
          addTag(tag);
          dropdown.style.display = 'none';
        });
      });
    }

    function addTag(tag) {
      if (!selectedTags.includes(tag)) {
        selectedTags.push(tag);
        renderTagChips();
        updateAvailableTags();
        applyFilters();
      }
    }

    function removeTag(tag) {
      selectedTags = selectedTags.filter(t => t !== tag);
      renderTagChips();
      updateAvailableTags();
      applyFilters();
    }

    function renderTagChips() {
      const tagArea = document.getElementById('tagArea');
      const existingChips = tagArea.querySelectorAll('.tag-chip');
      existingChips.forEach(chip => chip.remove());
      const addBtn = document.getElementById('addTagBtn');
      selectedTags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.innerHTML = `${tag} <span class="remove-tag" data-tag="${tag}">&times;</span>`;
        tagArea.insertBefore(chip, addBtn);
      });
      document.querySelectorAll('.remove-tag').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const tag = this.getAttribute('data-tag');
          removeTag(tag);
        });
      });
    }

    function showDependencyModal(modName) {
      const allMods = modData.map(transformRow);
      const mod = allMods.find(m => m.name === modName);
      if (!mod) {
        alert(`Mod "${modName}" not found.`);
        return;
      }
      document.getElementById('modalModName').textContent = mod.name;
      document.getElementById('modalCategory').textContent = mod.category;
      document.getElementById('modalTags').textContent = (mod.tags || []).join(', ') || '—';
      document.getElementById('modalDescription').textContent = mod.description || '—';
      const linksSpan = document.getElementById('modalLinks');
      linksSpan.innerHTML = '';
      if (mod.links) {
        linksSpan.innerHTML = `<a href="${mod.links.browser}" target="_blank" class="link-btn">🌐 Browser</a>
                               <a href="${mod.links.steam}" class="link-btn">Steam</a>`;
      } else {
        linksSpan.textContent = 'No links';
      }
      document.getElementById('depModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('depModal').classList.remove('active');
    }

    function updateModCounter() {
      const filtered = table.getRows().length;
      const total = modData.length;
      document.getElementById('modCounter').textContent = `${filtered} / ${total}`;
    }

    // Start the process
    loadData();
  </script>
</body>
</html>
